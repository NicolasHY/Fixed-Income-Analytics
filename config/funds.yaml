# ============================================================================
# Company EM Fixed Income Intelligence Platform — Configuration
# ============================================================================
# Centralized metadata for the analytical pipeline.
# All country/fund/threshold parameters are defined here to keep
# the codebase config-driven and easily extensible.
# ============================================================================

# ---------------------------------------------------------------------------
# Country universe
# ---------------------------------------------------------------------------
countries:
  local_currency:
    - Brazil
    - Mexico
    - South Africa
    - Poland
  hard_currency:
    - Colombia
    - Hungary
    - Romania

# Maturities to exclude due to poor data coverage
excluded_series:
  Colombia: ["2Y"]
  Hungary: ["20Y"]
  Romania: ["1Y"]

# ---------------------------------------------------------------------------
# LC Fund proxy parameters (Company L Bonds Emerging Markets Sust. — PLBEMSA)
# ---------------------------------------------------------------------------
lc_fund:
  name: "Company L Bonds Emerging Markets Sustainable"
  ticker: "PLBEMSA"
  weights:
    Brazil: 10.1
    Mexico: 8.8
    South Africa: 7.8
    Poland: 6.6
  effective_duration: 5.22
  benchmark_maturity: "5Y"

# ---------------------------------------------------------------------------
# VaR engine parameters
# ---------------------------------------------------------------------------
var:
  confidence_levels: [0.95, 0.99]
  historical_windows:
    1Y: 252
    2Y: 504
    3Y: 756
  monte_carlo:
    n_simulations: 10000
    random_seed: 42
    copula_dof: 5  # Student-t copula degrees of freedom
  stress_windows:
    COVID: ["2020-02-19", "2020-05-15"]
    Ukraine_Fed: ["2022-02-24", "2022-10-31"]
  primary_stress_window: COVID

# ---------------------------------------------------------------------------
# PCA parameters
# ---------------------------------------------------------------------------
pca:
  n_components: 3
  component_labels:
    - "level"
    - "slope"
    - "curve"

# ---------------------------------------------------------------------------
# Regime detection parameters
# ---------------------------------------------------------------------------
regime:
  gmm:
    max_components: 6
    covariance_type: "full"
    n_init: 10
    random_state: 42
  labels:
    0: "Normal"
    1: "EM Crisis"
    2: "Rate Shock"
    3: "Risk-On"
  colors:
    Normal: "#2ecc71"
    EM Crisis: "#e74c3c"
    Rate Shock: "#e67e22"
    Risk-On: "#3498db"

# ---------------------------------------------------------------------------
# Alert engine thresholds
# ---------------------------------------------------------------------------
alerts:
  pc_zscore_threshold: 3.0       # z-score above which PC alert fires
  pc_zscore_high_threshold: 4.0  # z-score for "high" severity
  vol_percentile: 0.90           # trailing 1Y percentile for vol spike
  vol_trailing_window: 252       # days for trailing vol window
  curve_zscore_threshold: 3.0    # z-score for country curve outlier
  curve_zscore_high_threshold: 4.0
  curve_rolling_window: 60       # days for rolling mean/std

# ---------------------------------------------------------------------------
# Macro events (for annotation and context)
# ---------------------------------------------------------------------------
macro_events:
  "2020-03-11": "COVID"
  "2022-02-24": "Russia invades Ukraine"
  "2022-09-26": "UK gilt crisis"
  "2023-03-10": "SVB collapse"
  "2023-10-07": "Hamas attack"
  "2024-11-05": "Trump elected"

# ---------------------------------------------------------------------------
# Pipeline health thresholds
# ---------------------------------------------------------------------------
pipeline:
  stale_data_hours: 48
  max_runtime_seconds: 300
  var_breach_alert_rate: 0.10  # flag if >10% breach rate

# ---------------------------------------------------------------------------
# Multi-portfolio definitions
# ---------------------------------------------------------------------------
# Weights are sourced from Research_Notes_2026-05-13.md (Bloomberg PORT,
# holdings/allocations as of 10/31/2025). Only countries present in data/raw/
# are included; off-universe holdings (Jordan, Montenegro, Bahamas, Indonesia,
# etc.) are omitted. Weights are raw % from the fund report and are normalised
# to sum to 1 internally — sums need not equal 100.
portfolios:
  - name: "EM Hard Currency Sustainable"
    id: "portfolio_1"
    aum_eur: 14_970_000
    # HC fund (DPBEMHF LX): top geographic allocation for Colombia/Hungary/Romania;
    # LC-universe countries proxied by their single largest top-10 holding weight.
    weights:
      Brazil: 4.16          # BRAZIL 6 5/8 03/15/35 (top 10)
      Colombia: 11.00       # top geographic allocation
      Hungary: 9.72         # top geographic allocation
      Mexico: 3.33          # MEX 4 1/2 03/19/34 (top 10)
      Poland: 4.98          # POLAND 5 3/4 11/16/32 (top 10)
      Romania: 8.39         # top geographic allocation
      South Africa: 4.32    # SOAF 5 3/4 09/30/49 (top 10)
    effective_duration: 6.89   # OAS effective duration per Bloomberg PORT
    benchmark_maturity: "5Y"

  - name: "EM Local Currency Sustainable"
    id: "portfolio_2"
    aum_eur: 5_160_000_000
    # LC fund (PLBEMSA LX): top geographic allocation for Brazil/Mexico/SA/Poland;
    # Hungary/Romania from top-10 holdings. Colombia is absent from the LC fund
    # (not mentioned in geographic allocation nor top-10 holdings).
    weights:
      Brazil: 10.12         # top geographic allocation
      Hungary: 2.23         # HGB 2 1/4 04/20/33 (top 10)
      Mexico: 8.76          # top geographic allocation
      Poland: 6.63          # top geographic allocation
      Romania: 1.64         # ROMGB 6.85 07/29/30 (top 10)
      South Africa: 7.75    # top geographic allocation
    effective_duration: 5.22   # OAS effective duration per Bloomberg PORT
    benchmark_maturity: "5Y"

# ---------------------------------------------------------------------------
# LLM briefing configuration
# ---------------------------------------------------------------------------
fred:
  key_path: "private/fred_key.txt"
  output_path: "data/output/risk_free_rates.csv"
  fetch_start: "2018-01-01"

briefing:
  model: "gemini-2.0-flash"
  api_key_path: "private/gemini_key.txt"
  system_prompt: |
    You are a senior EM Fixed Income analyst at the Company.
    Given the following daily data for the EM Local Currency bond fund, produce a concise
    briefing for the portfolio manager.
    Structure: (1) regime status, (2) notable country-level moves, (3) VaR changes,
    (4) any alerts. Be precise. No filler. Use basis points for yield changes.
  showcase_dates:
    - "2022-03-18"
    - "2022-09-23"
    - "2023-06-15"
    - "2024-09-18"
    - "2025-01-22"
